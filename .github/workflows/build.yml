name: Build

on: push

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - bun-linux-x64
          - bun-linux-arm64
          - bun-darwin-x64
          - bun-darwin-arm64
          - bun-windows-x64
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun build --compile --target=${{ matrix.target }} ./bin/yate.js --outfile yate-${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: yate-${{ matrix.target }}
          path: yate-${{ matrix.target }}${{ contains(matrix.target, 'windows') && '.exe' || '' }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: yate-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: yate-*
